services:
  mini-rag:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mini-rag
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      MINI_RAG_ADMIN_TOKEN: ${MINI_RAG_ADMIN_TOKEN:?MINI_RAG_ADMIN_TOKEN is required}
      MINI_RAG_DEBUG: ${MINI_RAG_DEBUG:-false}
      MINI_RAG_CORS_ORIGINS: ${MINI_RAG_CORS_ORIGINS:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_EMBEDDING_MODEL: ${LLM_EMBEDDING_MODEL:-text-embedding-3-small}
    restart: unless-stopped
