<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-RAG 个人知识库</title>
    <!-- 引入现代化字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/static/css/style.css?v=1.1.1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- 引入 Marked.js 解析 Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1><i class="fas fa-book-open"></i> Mini-RAG</h1>
                <p class="subtitle" id="tenantSubtitle">个人知识库</p>
            </div>

            <!-- 统计信息 -->
            <div class="stats-card">
                <div class="stat-item">
                    <span class="stat-value" id="totalDocs">0</span>
                    <span class="stat-label">文档</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="totalTags">0</span>
                    <span class="stat-label">标签</span>
                </div>
            </div>

            <!-- 标签列表 -->
            <div class="tags-section">
                <h3><i class="fas fa-tags"></i> 标签</h3>
                <div class="tags-list" id="tagsList">
                    <!-- 动态加载 -->
                </div>
            </div>

            <!-- 新建文档按钮 -->
            <button class="btn-primary btn-new-doc" onclick="showDocModal()">
                <i class="fas fa-plus"></i> 新建文档
            </button>

            <!-- 设置按钮 -->
            <button class="btn-secondary btn-settings" onclick="showSettingsModal()"
                style="margin-top: 12px; width: 100%; padding: 14px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: #e2e8f0;">
                <i class="fas fa-cog"></i> 模型配置
            </button>

            <button class="btn-secondary btn-settings" onclick="changeAuthToken()"
                style="margin-top: 12px; width: 100%; padding: 14px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: #e2e8f0;">
                <i class="fas fa-lock"></i> 租户登录
            </button>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 搜索栏 -->
            <div class="search-bar">
                <div class="search-input-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="搜索知识库..." onkeypress="handleSearchKey(event)">
                    <button class="btn-search" onclick="performSearch()">搜索</button>
                </div>
                <div class="search-tabs">
                    <button class="tab-btn active" onclick="switchTab('documents')">
                        <i class="fas fa-file-alt"></i> <span>文档列表</span>
                    </button>
                    <button class="tab-btn" onclick="switchTab('search')">
                        <i class="fas fa-search"></i> <span>搜索结果</span>
                    </button>
                    <button class="tab-btn qa-special-btn" onclick="switchTab('qa')">
                        <i class="fas fa-bolt"></i> <span>智能问答</span>
                        <div class="qa-glow"></div>
                    </button>
                </div>
            </div>

            <!-- 文档列表 -->
            <div class="content-section" id="documentsSection">
                <div class="section-header">
                    <h2>文档列表</h2>
                    <span class="doc-count" id="docCount">共 0 篇文档</span>
                </div>
                <div class="documents-grid" id="documentsList">
                    <!-- 动态加载 -->
                </div>
            </div>

            <!-- 搜索结果 -->
            <div class="content-section hidden" id="searchSection">
                <div class="section-header">
                    <h2>搜索结果</h2>
                    <span class="result-info" id="searchInfo"></span>
                </div>
                <div class="search-results" id="searchResults">
                    <!-- 动态加载 -->
                </div>
            </div>

            <!-- 智能问答 -->
            <div class="content-section hidden" id="qaSection">
                <div class="section-header">
                    <h2>智能问答</h2>
                </div>
                <div class="qa-container">
                    <div class="qa-input-area">
                        <textarea id="questionInput" placeholder="输入您的问题，系统将从知识库中查找相关内容..." rows="3"></textarea>
                        <button class="btn-primary" id="askQuestionBtn" onclick="askQuestion()">
                            <i class="fas fa-paper-plane"></i> 提问
                        </button>
                    </div>
                    <div class="qa-answer hidden" id="qaAnswer">
                        <h3>回答</h3>
                        <div class="answer-meta hidden" id="answerMeta"></div>
                        <div class="answer-content" id="answerContent"></div>
                        <div class="answer-sources" id="answerSources">
                            <h4>参考来源</h4>
                            <div class="sources-list" id="sourcesList"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 文档模态框 -->
    <div class="modal hidden" id="docModal">
        <div class="modal-overlay" onclick="hideDocModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">新建文档</h3>
                <button class="btn-close" onclick="hideDocModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="docId">
                <div class="form-group">
                    <label for="docTitle">标题</label>
                    <input type="text" id="docTitle" placeholder="请输入文档标题">
                </div>
                <div class="form-group">
                    <label for="docContent">内容</label>
                    <textarea id="docContent" placeholder="请输入文档内容..." rows="12"></textarea>
                </div>
                <div class="form-group">
                    <label for="docTags">标签 (用逗号分隔)</label>
                    <input type="text" id="docTags" placeholder="例如: 技术, 编程, Python">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="hideDocModal()">取消</button>
                <button class="btn-primary" onclick="saveDocument()">保存</button>
            </div>
        </div>
    </div>

    <!-- 文档详情模态框 -->
    <div class="modal hidden" id="viewModal">
        <div class="modal-overlay" onclick="hideViewModal()"></div>
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3 id="viewTitle">文档详情</h3>
                <button class="btn-close" onclick="hideViewModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="view-meta">
                    <div class="meta-item">
                        <i class="fas fa-clock"></i>
                        <span id="viewTime"></span>
                    </div>
                    <div class="meta-item">
                        <i class="fas fa-tags"></i>
                        <span id="viewTags"></span>
                    </div>
                </div>
                <div class="view-content" id="viewContent"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-danger" onclick="deleteCurrentDoc()">
                    <i class="fas fa-trash"></i> 删除
                </button>
                <button class="btn-secondary" onclick="hideViewModal()">关闭</button>
                <button class="btn-primary" onclick="editCurrentDoc()">
                    <i class="fas fa-edit"></i> 编辑
                </button>
            </div>
        </div>
    </div>

    <!-- 设置模态框 -->
    <div class="modal hidden" id="settingsModal">
        <div class="modal-overlay" onclick="hideSettingsModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-cogs"></i> 大模型(LLM)引擎配置</h3>
                <button class="btn-close" onclick="hideSettingsModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>推荐快捷预设 (快速填入厂商参数)</label>
                    <div class="preset-buttons">
                        <button class="btn-preset" onclick="applyPreset('deepseek')">DeepSeek</button>
                        <button class="btn-preset" onclick="applyPreset('glm')">智谱 GLM</button>
                        <button class="btn-preset" onclick="applyPreset('qwen')">阿里千问</button>
                        <button class="btn-preset" onclick="applyPreset('minimax')">Minimax</button>
                        <button class="btn-preset" onclick="applyPreset('custom')">自定义</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="settingBaseUrl">API Base URL</label>
                    <input type="text" id="settingBaseUrl" placeholder="例如: https://api.deepseek.com/v1">
                </div>
                <div class="form-group">
                    <label for="settingApiKey">API Key</label>
                    <input type="password" id="settingApiKey" placeholder="填入您的 sk-xxxxxx">
                </div>
                <div class="form-group">
                    <label for="settingModelName">模型标识 (Model)</label>
                    <input type="text" id="settingModelName" placeholder="例如: deepseek-chat">
                </div>
                <p style="font-size: 12px; color: var(--text-secondary); margin-top: -10px;">提示：自定义模式可填入白山云代理等任意兼容
                    OpenAI 接口标准的提供商信息。</p>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="hideSettingsModal()">取消</button>
                <button class="btn-primary" onclick="saveSettings()">验证并保存</button>
            </div>
        </div>
    </div>

    <!-- 租户登录模态框 -->
    <div class="modal hidden" id="authModal">
        <div class="modal-overlay" onclick="cancelAuthModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="authModalTitle">租户登录</h3>
                <button class="btn-close" onclick="cancelAuthModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <p id="authModalMessage" style="margin-bottom: 16px; color: var(--text-secondary);">请输入租户 ID 和访问令牌以继续访问知识库。</p>
                <div class="form-group">
                    <label for="authTenantIdInput">租户 ID</label>
                    <input type="text" id="authTenantIdInput" list="authTenantOptions" placeholder="例如: default" onkeydown="handleAuthTokenKey(event)">
                    <datalist id="authTenantOptions"></datalist>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="authTokenInput">访问令牌</label>
                    <input type="password" id="authTokenInput" placeholder="请输入访问令牌" onkeydown="handleAuthTokenKey(event)">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="cancelAuthModal()">取消</button>
                <button class="btn-primary" onclick="submitAuthModal()">确认</button>
            </div>
        </div>
    </div>

    <!-- 通用确认模态框 -->
    <div class="modal hidden" id="confirmModal">
        <div class="modal-overlay" onclick="resolveConfirmModal(false)"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="confirmModalTitle">确认操作</h3>
                <button class="btn-close" onclick="resolveConfirmModal(false)">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <p id="confirmModalMessage" style="color: var(--text-secondary);">请确认是否继续。</p>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="resolveConfirmModal(false)">取消</button>
                <button class="btn-primary" onclick="resolveConfirmModal(true)">继续</button>
            </div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div class="toast hidden" id="toast"></div>

    <script src="/static/js/app.js?v=1.1.2"></script>
</body>

</html>
